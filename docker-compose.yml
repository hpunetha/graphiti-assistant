services:
  neo4j:
    image: neo4j:5.26-community
    container_name: graphiti-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser — open http://localhost:7474
      - "7687:7687"   # Bolt protocol — Graphiti connects here
    environment:
      - NEO4J_AUTH=neo4j/demodemo123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4j_data:
