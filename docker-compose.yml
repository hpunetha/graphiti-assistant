services:
  neo4j:
    image: neo4j:5.26-community
    container_name: graphiti-neo4j
    ports:
      - "7474:7474" # Neo4j Browser — open http://localhost:7474
      - "7687:7687" # Bolt protocol — Graphiti connects here
    environment:
      - NEO4J_AUTH=neo4j/demodemo123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
    volumes:
      - ./neo4j_data:/data
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:7474" ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  medbook-api:
    build: .
    container_name: medbook-api
    profiles: [ "api" ]
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - HOSPITAL_API_URL=http://hospital-api:8001
    depends_on:
      neo4j:
        condition: service_healthy
      hospital-api:
        condition: service_started
    volumes:
      - ./logs:/app/logs

  hospital-api:
    build:
      context: ./hospital_api
    container_name: hospital-api
    profiles: [ "api" ]
    ports:
      - "8001:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=demodemo123
    depends_on:
      neo4j:
        condition: service_healthy
