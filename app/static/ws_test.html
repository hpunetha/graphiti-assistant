<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedBook — WebSocket Test</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --accent:    #2563eb;
      --accent-lt: #3b82f6;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #eab308;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --bot-bg:    #1e2730;
      --user-bg:   #1d3a6e;
      --radius:    12px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header .logo {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }

    header h1 { font-size: 17px; font-weight: 700; }
    header .subtitle { font-size: 12px; color: var(--muted); margin-top: 1px; }

    /* status pill */
    #status-pill {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 500;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #0d1117;
      transition: all .3s;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
      transition: background .3s;
    }
    #status-pill.connected #status-dot  { background: var(--green); }
    #status-pill.connected #status-text { color: var(--green); }

    /* session badge */
    #session-badge {
      font-size: 11px; color: var(--muted);
      padding: 3px 10px;
      border-radius: 6px;
      background: var(--border);
      font-family: monospace;
      display: none;
    }

    /* ── Main layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    aside {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 12px;
      display: flex; flex-direction: column; gap: 8px;
    }

    aside h2 { font-size: 11px; font-weight: 600; text-transform: uppercase;
                letter-spacing: .08em; color: var(--muted); margin-bottom: 4px; }

    .quick-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 12px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      transition: background .15s, border-color .15s;
    }
    .quick-btn:hover { background: #1f2937; border-color: var(--accent); }
    .quick-btn .ql { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .divider { border: none; border-top: 1px solid var(--border); margin: 4px 0; }

    .danger-btn {
      background: transparent;
      border: 1px solid #7f1d1d;
      border-radius: 8px;
      color: var(--red);
      font-size: 12px;
      padding: 8px 10px;
      cursor: pointer;
      text-align: left;
      transition: background .15s;
    }
    .danger-btn:hover { background: #2c0b0b; }

    /* ── Chat area ── */
    main {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 16px;
      scroll-behavior: smooth;
    }

    /* scrollbar */
    #chat-log::-webkit-scrollbar { width: 6px; }
    #chat-log::-webkit-scrollbar-track { background: transparent; }
    #chat-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* messages */
    .msg-row {
      display: flex; gap: 10px;
      animation: fadeUp .2s ease both;
    }
    .msg-row.user { flex-direction: row-reverse; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px; height: 32px; border-radius: 50%;
      flex-shrink: 0;
      display: grid; place-items: center;
      font-size: 15px;
      background: var(--surface);
      border: 1px solid var(--border);
    }
    .msg-row.user .avatar { background: var(--user-bg); border-color: var(--accent); }

    .bubble {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.bot  .bubble { background: var(--bot-bg);  border-radius: 4px 14px 14px 14px; }
    .msg-row.user .bubble { background: var(--user-bg); border-radius: 14px 4px 14px 14px; }
    .msg-row.system .bubble {
      background: #1a1f1a;
      border: 1px solid #2d4a2d;
      color: var(--green);
      font-size: 12px;
      font-family: monospace;
      border-radius: 8px;
      max-width: 100%;
    }
    .msg-row.error .bubble {
      background: #2c0b0b;
      border: 1px solid #7f1d1d;
      color: var(--red);
      border-radius: 8px;
      max-width: 100%;
    }

    .ts { font-size: 10px; color: var(--muted); margin-top: 4px;
           display: block; }
    .msg-row.user .ts { text-align: right; }

    /* typing indicator */
    .typing-row { display: flex; gap: 10px; align-items: center; }
    .typing-bubble {
      background: var(--bot-bg);
      border-radius: 4px 14px 14px 14px;
      padding: 12px 16px;
      display: flex; gap: 5px;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      animation: bounce .9s ease infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: .15s; }
    .typing-bubble span:nth-child(3) { animation-delay: .30s; }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      40%      { transform: translateY(-6px); }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      display: flex; gap: 10px;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      height: 44px;
      line-height: 24px;
      transition: border-color .2s;
    }
    #msg-input:focus { border-color: var(--accent-lt); }
    #msg-input::placeholder { color: var(--muted); }
    #msg-input:disabled { opacity: .4; cursor: not-allowed; }

    #send-btn {
      width: 44px; height: 44px;
      background: var(--accent);
      border: none; border-radius: 10px;
      color: #fff; font-size: 18px;
      cursor: pointer;
      display: grid; place-items: center;
      flex-shrink: 0;
      transition: background .15s, transform .1s;
    }
    #send-btn:hover:not(:disabled) { background: var(--accent-lt); }
    #send-btn:active:not(:disabled) { transform: scale(.93); }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }

    /* connect button in header */
    #connect-btn {
      background: var(--accent);
      border: none; border-radius: 8px;
      color: #fff; font-size: 12px; font-weight: 600;
      padding: 6px 14px;
      cursor: pointer;
      transition: background .15s;
    }
    #connect-btn:hover { background: var(--accent-lt); }
    #connect-btn.disconnect { background: #7f1d1d; }
    #connect-btn.disconnect:hover { background: var(--red); }

    /* empty state */
    #empty-state {
      margin: auto;
      text-align: center;
      color: var(--muted);
    }
    #empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    #empty-state p { font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="logo">🏥</div>
  <div>
    <h1>MedBook</h1>
    <div class="subtitle">WebSocket Chat Tester &mdash; <code>/ws/chat</code></div>
  </div>
  <span id="session-badge">session: —</span>
  <div id="status-pill">
    <div id="status-dot"></div>
    <span id="status-text">Disconnected</span>
  </div>
  <button id="connect-btn" onclick="toggleConnect()">Connect</button>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside>
    <h2>Quick Messages</h2>
    <button class="quick-btn" onclick="quickSend('I have a headache and want to see a doctor')">
      🤒 Symptom
      <div class="ql">Headache → doctor</div>
    </button>
    <button class="quick-btn" onclick="quickSend('8952039590')">
      📞 Phone number
      <div class="ql">8952039590</div>
    </button>
    <button class="quick-btn" onclick="quickSend('Harsh')">
      👤 Name
      <div class="ql">Harsh</div>
    </button>
    <button class="quick-btn" onclick="quickSend('33')">
      🎂 Age
      <div class="ql">33</div>
    </button>
    <button class="quick-btn" onclick="quickSend('male')">
      ⚧ Gender
      <div class="ql">male</div>
    </button>
    <button class="quick-btn" onclick="quickSend('tomorrow morning')">
      📅 Date / time
      <div class="ql">tomorrow morning</div>
    </button>
    <button class="quick-btn" onclick="quickSend('show my bookings')">
      📋 My bookings
    </button>

    <hr class="divider" />
    <h2>Session</h2>
    <button class="danger-btn" onclick="sendReset()">🔄 Reset conversation</button>
  </aside>

  <!-- ── Chat ── -->
  <main>
    <div id="chat-log">
      <div id="empty-state">
        <div class="icon">🔌</div>
        <p>Click <strong>Connect</strong> to open a WebSocket<br>session with <code>ws://localhost:8000/ws/chat</code></p>
      </div>
    </div>

    <div class="input-bar">
      <textarea id="msg-input" placeholder="Type a message and press Enter…" disabled
                onkeydown="handleKey(event)"></textarea>
      <button id="send-btn" onclick="sendMessage()" disabled title="Send">➤</button>
    </div>
  </main>
</div>

<script>
  let ws = null;

  // ── Connection ──────────────────────────────────────────────
  function toggleConnect() {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.close();
    } else {
      connect();
    }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const url   = `${proto}://${location.host}/ws/chat`;
    ws = new WebSocket(url);

    ws.onopen = () => {
      setStatus('connected');
    };

    ws.onmessage = (event) => {
      removeTyping();
      const data = JSON.parse(event.data);

      if (data.type === 'connected') {
        document.getElementById('session-badge').textContent = `session: ${data.session_id.slice(0,8)}…`;
        document.getElementById('session-badge').style.display = 'block';
        appendMsg('system', `✅ Connected  •  session: ${data.session_id}`);
        enableInput(true);
        return;
      }
      if (data.type === 'reply')   appendMsg('bot',    data.message);
      if (data.type === 'system')  appendMsg('system', data.message);
      if (data.type === 'error')   appendMsg('error',  data.message);
    };

    ws.onclose = () => {
      setStatus('disconnected');
      enableInput(false);
      document.getElementById('session-badge').style.display = 'none';
      appendMsg('system', '🔌 Disconnected from server.');
    };

    ws.onerror = () => {
      appendMsg('error', '⚠️ WebSocket error — is the API running on port 8000?');
    };
  }

  // ── Messaging ───────────────────────────────────────────────
  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;

    appendMsg('user', text);
    ws.send(text);
    input.value = '';
    input.style.height = '44px';
    showTyping();
  }

  function quickSend(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      alert('Connect first!');
      return;
    }
    document.getElementById('msg-input').value = text;
    sendMessage();
  }

  function sendReset() {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      alert('Connect first!');
      return;
    }
    ws.send('reset');
    appendMsg('user', 'reset');
    showTyping();
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // ── UI helpers ───────────────────────────────────────────────
  function appendMsg(type, text) {
    const log = document.getElementById('chat-log');
    const empty = document.getElementById('empty-state');
    if (empty) empty.remove();

    const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    if (type === 'system' || type === 'error') {
      const row = document.createElement('div');
      row.className = `msg-row ${type}`;
      row.innerHTML = `<div class="bubble">${escHtml(text)}<span class="ts">${now}</span></div>`;
      log.appendChild(row);
    } else {
      const isUser = type === 'user';
      const avatar = isUser ? '🧑' : '🤖';
      const row = document.createElement('div');
      row.className = `msg-row ${type}`;
      row.innerHTML = `
        <div class="avatar">${avatar}</div>
        <div>
          <div class="bubble">${escHtml(text)}</div>
          <span class="ts">${now}</span>
        </div>`;
      log.appendChild(row);
    }

    log.scrollTop = log.scrollHeight;
  }

  function showTyping() {
    removeTyping();
    const log = document.getElementById('chat-log');
    const row = document.createElement('div');
    row.id = 'typing';
    row.className = 'typing-row';
    row.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="typing-bubble">
        <span></span><span></span><span></span>
      </div>`;
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  function setStatus(state) {
    const pill = document.getElementById('status-pill');
    const text = document.getElementById('status-text');
    const btn  = document.getElementById('connect-btn');

    if (state === 'connected') {
      pill.className = 'connected';
      text.textContent = 'Connected';
      btn.textContent = 'Disconnect';
      btn.className = 'disconnect';
    } else {
      pill.className = '';
      text.textContent = 'Disconnected';
      btn.textContent = 'Connect';
      btn.className = '';
    }
  }

  function enableInput(on) {
    document.getElementById('msg-input').disabled  = !on;
    document.getElementById('send-btn').disabled   = !on;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/\n/g,'<br>');
  }
</script>
</body>
</html>
